# Example configuration showing a SigNoz collector that:
#   - Accepts OTLP traffic over gRPC (4317) and HTTP (4318).
#   - Scrapes host metrics from the machine the collector runs on.
#   - Derives RED span metrics (`signoz.signoz_*` metrics) from incoming traces
#     and writes them straight to ClickHouse via the delta-temporality pipeline.
#   - Persists traces/metrics/logs to a ClickHouse cluster reachable at
#     `signoz-host:9000`. Replace this with your real ClickHouse address.
receivers:
  otlp:
    protocols:
      grpc:
      http:
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      load:
      memory:
      disk:
      filesystem:
      network:
processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  signozspanmetrics/delta:
    metrics_exporter: signozclickhousemetrics
    metrics_flush_interval: 60s
    latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s ]
    dimensions_cache_size: 100000
    aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
    enable_exp_histogram: true
    skip_spans_older_than: 24h
    dimensions:
      - name: service.namespace
        default: default
      - name: deployment.environment
        default: default
  # memory_limiter:
  #   # 80% of maximum memory up to 2G
  #   limit_mib: 1500
  #   # 25% of limit up to 2G
  #   spike_limit_mib: 512
  #   check_interval: 5s
  #
  #   # 50% of the maximum memory
  #   limit_percentage: 50
  #   # 20% of max memory usage spike expected
  #   spike_limit_percentage: 20
extensions:
  health_check:
  pprof:
  zpages:
exporters:
  clickhousetraces:
    datasource: tcp://signoz-host:9000/?database=signoz_traces
  signozclickhousemetrics:
    dsn: tcp://signoz-host:9000/signoz_metrics
  clickhouselogsexporter:
    dsn: tcp://signoz-host:9000
    timeout: 10s
    sending_queue:
      enabled: true
      queue_size: 150
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [signozspanmetrics/delta, batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [batch]
      exporters: [signozclickhousemetrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouselogsexporter]
