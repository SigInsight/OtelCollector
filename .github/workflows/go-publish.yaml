name: go-publish

# Go module 发布不需要构建产物。这个 workflow 的唯一作用是：
# 打 tag 后主动请求 Go module proxy 索引该版本，加速 pkg.go.dev 收录。
# （只要有人 go get 一次，proxy 就会自动索引，所以这步是可选的加速手段。）

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: read

jobs:
  trigger-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: wait for module proxy to index this version
        run: |
          version="${GITHUB_REF#refs/tags/}"
          # The Go module proxy escapes uppercase path characters as ! + lowercase.
          module_path="github.com/!sig!insight/!otel!collector"
          url="https://proxy.golang.org/${module_path}/@v/${version}.mod"

          # A request triggers proxy indexing, but a new tag is not necessarily
          # available immediately. Retry instead of failing on the initial 404.
          for attempt in {1..30}; do
            if curl -sSf -o /dev/null "${url}"; then
              echo "module ${version} is now resolvable via proxy"
              exit 0
            fi

            echo "module ${version} is not indexed yet (attempt ${attempt}/30)"
            sleep 10
          done

          echo "::error::module ${version} was not resolvable via proxy after 5 minutes"
          exit 1
